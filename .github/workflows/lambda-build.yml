name: Build Lambda Zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Using stable 1.24 as 1.26 is very new
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Build and Zip (x86_64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bootstrap main.go
          zip tls_bypass_lambda_x86.zip bootstrap
          rm bootstrap

      - name: Build and Zip (ARM64/Graviton)
        run: |
          GOOS=linux GOARCH=arm64 go build -o bootstrap main.go
          zip tls_bypass_lambda_arm64.zip bootstrap
          rm bootstrap

      - name: Upload x86 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls-bypass-lambda-x86
          path: tls_bypass_lambda_x86.zip
          retention-days: 7

      - name: Upload ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls-bypass-lambda-arm64
          path: tls_bypass_lambda_arm64.zip
          retention-days: 7
